<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://ines-cakes-default-rtdb.europe-west1.firebasedatabase.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.N.E.S. - All Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reviews-page { padding: 100px 0 60px; min-height: 100vh; }
        .reviews-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .reviews-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }
        .reviews-page__grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-top: 32px;
        }
        .reviews-page__empty {
            text-align: center; padding: 60px 20px; color: var(--text-light);
            grid-column: 1 / -1;
        }
        @media (max-width: 992px) { .reviews-page__grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .reviews-page__grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 60 60" width="42" height="42">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#C8963E"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#C8963E"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#C8963E" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#C8963E"/>
                <ellipse cx="30" cy="16" rx="10" ry="2" fill="#E8C47A" opacity="0.5"/>
                <path d="M28 5c0-2 1-3 2-3s2 1 2 3" stroke="#C8963E" stroke-width="1.5" fill="none"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
        </div>
    </div>
</header>

<section class="reviews-page">
    <div class="container">
        <a href="/" class="reviews-page__back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n="revpage.back">Back to Home</span>
        </a>
        <h2 class="section__title" data-i18n="revpage.title">All Reviews</h2>
        <p class="section__subtitle" data-i18n="revpage.subtitle">What our customers say about us</p>
        <div class="reviews-page__grid" id="allReviewsGrid"></div>

        <div class="reviews__write" style="margin-top:40px;">
            <button class="btn btn--primary" id="writeReviewBtn" data-i18n="reviews.write">Write a Review</button>
        </div>
        <div class="reviews__form-wrap" id="reviewFormWrap" style="display:none;">
            <form class="review-form" id="clientReviewForm">
                <h3 data-i18n="reviews.formTitle">Leave Your Review</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="revName" data-i18n="reviews.yourName">Your Name</label>
                        <input type="text" id="revName" name="revName" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="reviews.rating">Rating</label>
                        <div class="star-picker" id="starPicker">
                            <span class="star-pick" data-star="1">★</span>
                            <span class="star-pick" data-star="2">★</span>
                            <span class="star-pick" data-star="3">★</span>
                            <span class="star-pick" data-star="4">★</span>
                            <span class="star-pick active" data-star="5">★</span>
                        </div>
                        <input type="hidden" id="revRating" name="revRating" value="5">
                    </div>
                </div>
                <div class="form-group form-group--full">
                    <label for="revText" data-i18n="reviews.yourReview">Your Review</label>
                    <textarea id="revText" name="revText" rows="3" required data-i18n-placeholder="reviews.reviewPh" placeholder="Tell us about your experience..."></textarea>
                </div>
                <div class="form-group form-group--full">
                    <label for="revPhoto" data-i18n="reviews.photo">Add a photo (optional)</label>
                    <input type="file" id="revPhoto" name="revPhoto" accept="image/*">
                    <div id="revPhotoPreview" class="review-photo-preview"></div>
                </div>
                <button type="submit" class="btn btn--primary" data-i18n="reviews.submit">Send Review</button>
            </form>
            <div class="review-form__success" id="reviewSuccess" style="display:none;">
                <svg viewBox="0 0 64 64" width="48" height="48"><circle cx="32" cy="32" r="30" fill="#C8963E" opacity="0.15"/><path d="M20 32l8 8 16-16" stroke="#C8963E" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
                <p data-i18n="reviews.thanks">Thank you! Your review has been submitted.</p>
            </div>
        </div>
    </div>
</section>

<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script defer src="js/firebase-init.js"></script>
<script defer src="js/maintenance-guard.js"></script>
<script defer src="js/reviews-page.js"></script>
</body>
</html>
