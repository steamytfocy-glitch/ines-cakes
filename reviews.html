<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://ines-cakes-default-rtdb.europe-west1.firebasedatabase.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews — I.N.E.S. Cakes, Donegal</title>
    <meta name="description" content="Read reviews from happy customers of I.N.E.S. — homemade custom cakes made fresh to order in County Donegal, Ireland.">
    <link rel="canonical" href="https://www.inescake.com/reviews">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="I.N.E.S. Cakes">
    <meta property="og:title" content="Customer Reviews — I.N.E.S. Cakes, Donegal">
    <meta property="og:description" content="Read reviews from happy customers of I.N.E.S. — homemade custom cakes made fresh to order in County Donegal, Ireland.">
    <meta property="og:url" content="https://www.inescake.com/reviews">
    <meta property="og:image" content="https://www.inescake.com/images/og-logo.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.inescake.com/images/og-logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reviews-page { padding: 100px 0 60px; min-height: 100vh; }
        .reviews-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .reviews-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }
        .reviews-page__grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-top: 32px;
        }
        .reviews-page__empty {
            text-align: center; padding: 60px 20px; color: var(--text-light);
            grid-column: 1 / -1;
        }
        @media (max-width: 992px) { .reviews-page__grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .reviews-page__grid { grid-template-columns: 1fr; } }

        .reviews-page__grid .review-card { position: relative; }
        .review-card__del {
            position: absolute; top: 10px; right: 10px;
            display: inline-flex; align-items: center; gap: 4px;
            background: none; border: 0; cursor: pointer;
            color: #b9a58c; font: 600 12px 'Montserrat', sans-serif;
            padding: 4px 7px; border-radius: 7px; transition: .2s ease;
        }
        .review-card__del:hover { color: #c0392b; background: rgba(192,57,43,0.08); }

        .google-cta {
            background: var(--white); border: 1px solid #E8D9BC; border-radius: 16px;
            box-shadow: var(--shadow); padding: 22px 24px; margin: 0 auto 28px; max-width: 560px;
            text-align: center;
        }
        .google-cta__head {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--brown);
            margin-bottom: 14px;
        }
        .google-cta__stars { color: #FBBC05; letter-spacing: 2px; }
        .google-cta__btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 64 64" width="42" height="42" fill="none" stroke="#3D2E1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M32 11c-1.1-2-3.8-1.1-3.8 0.9 0 1.7 2.4 3 3.8 4 1.4-1 3.8-2.3 3.8-4 0-2-2.7-2.9-3.8-0.9z"/><path d="M32 16.2c-0.6-1.6-0.3-3 0-4"/><path d="M32 16.2 A4 1.8 0 1 1 30.5 19.6 A7 2.2 0 1 1 30.5 24.6 A10 2.6 0 1 1 31 29.8"/><path d="M17.5 33 L46.5 33 L43.7 52.5 C43.5 53.8 42.4 54.8 41 54.8 L23 54.8 C21.6 54.8 20.5 53.8 20.3 52.5 Z"/></svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
                <div class="lang-switcher">
                    <button type="button" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-trigger__label">EN</span>
                        <svg class="lang-trigger__chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="listbox">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="ga">Gaeilge</button>
                        <button class="lang-btn" data-lang="ua">Українська</button>
                        <button class="lang-btn" data-lang="ru">Русский</button>
                    </div>
                </div>
        </div>
    </div>
</header>

<section class="reviews-page">
    <div class="container">
        <a href="/" class="reviews-page__back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n="revpage.back">Back to Home</span>
        </a>
        <h2 class="section__title" data-i18n="revpage.title">All Reviews</h2>
        <p class="section__subtitle" data-i18n="revpage.subtitle">What our customers say about us</p>
        <div class="google-cta" id="googleReviews" style="display:none;"></div>
        <div class="reviews-page__grid" id="allReviewsGrid"></div>

        <div class="reviews__write" style="margin-top:40px;">
            <button class="btn btn--primary" id="writeReviewBtn" data-i18n="reviews.write">Write a Review</button>
        </div>
        <div class="reviews__form-wrap" id="reviewFormWrap" style="display:none;">
            <form class="review-form" id="clientReviewForm">
                <h3 data-i18n="reviews.formTitle">Leave Your Review</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="revName" data-i18n="reviews.yourName">Your Name</label>
                        <input type="text" id="revName" name="revName" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="reviews.rating">Rating</label>
                        <div class="star-picker" id="starPicker">
                            <span class="star-pick" data-star="1">★</span>
                            <span class="star-pick" data-star="2">★</span>
                            <span class="star-pick" data-star="3">★</span>
                            <span class="star-pick" data-star="4">★</span>
                            <span class="star-pick active" data-star="5">★</span>
                        </div>
                        <input type="hidden" id="revRating" name="revRating" value="5">
                    </div>
                </div>
                <div class="form-group form-group--full">
                    <label for="revText" data-i18n="reviews.yourReview">Your Review</label>
                    <textarea id="revText" name="revText" rows="3" required data-i18n-placeholder="reviews.reviewPh" placeholder="Tell us about your experience..."></textarea>
                </div>
                <div class="form-group form-group--full">
                    <label for="revPhoto" data-i18n="reviews.photo">Add a photo (optional)</label>
                    <input type="file" id="revPhoto" name="revPhoto" accept="image/*">
                    <div id="revPhotoPreview" class="review-photo-preview"></div>
                </div>
                <button type="submit" class="btn btn--primary" data-i18n="reviews.submit">Send Review</button>
            </form>
            <div class="review-form__success" id="reviewSuccess" style="display:none;">
                <svg viewBox="0 0 64 64" width="48" height="48"><circle cx="32" cy="32" r="30" fill="#C8963E" opacity="0.15"/><path d="M20 32l8 8 16-16" stroke="#C8963E" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
                <p data-i18n="reviews.thanks">Thank you! Your review has been submitted.</p>
            </div>
        </div>
    </div>
</section>

<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script defer src="js/firebase-init.js"></script>
<script defer src="js/lang-switcher.js"></script>
<script defer src="js/maintenance-guard.js"></script>
<script defer src="js/reviews-page.js?v=2"></script>
</body>
</html>
