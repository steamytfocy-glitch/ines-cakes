<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.N.E.S. — My Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header" id="header">
    <div class="container header__inner">
        <a href="index.html" class="logo">
            <svg class="logo__icon" viewBox="0 0 64 64" width="40" height="40" fill="none" stroke="#3D2E1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 11c-1.1-2-3.8-1.1-3.8 0.9 0 1.7 2.4 3 3.8 4 1.4-1 3.8-2.3 3.8-4 0-2-2.7-2.9-3.8-0.9z"/>
                <path d="M32 16.2c-0.6-1.6-0.3-3 0-4"/>
                <path d="M32 16.2 A4 1.8 0 1 1 30.5 19.6 A7 2.2 0 1 1 30.5 24.6 A10 2.6 0 1 1 31 29.8"/>
                <path d="M17.5 33 L46.5 33 L43.7 52.5 C43.5 53.8 42.4 54.8 41 54.8 L23 54.8 C21.6 54.8 20.5 53.8 20.3 52.5 Z"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ua">UA</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>
            <a href="myorders.html" class="header__cart" aria-label="My Orders" title="My Orders">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
            <a href="cart.html" class="header__cart" aria-label="Cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="header__cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<section class="myorders section">
    <div class="container container--narrow">
        <a href="index.html" class="back-link" data-i18n="mo.back">&larr; Back to Home</a>
        <h1 class="cart__title" data-i18n="mo.title">My Orders</h1>
        <p class="myorders__sub" data-i18n="mo.sub">Your orders are saved on this device. On another phone, add an order by its code.</p>

        <div class="myorders__add">
            <input type="text" id="moCodeInput" placeholder="INES-XXXX" autocomplete="off">
            <button class="btn btn--primary" id="moAddBtn" data-i18n="mo.add">Add order</button>
        </div>
        <div class="os__error" id="moError" style="display:none;" data-i18n="mo.notfound">Order not found. Please check the number.</div>

        <div class="myorders__list" id="moList"></div>
        <div class="myorders__empty" id="moEmpty" style="display:none;">
            <p data-i18n="mo.empty">No orders yet on this device.</p>
            <a href="index.html#gallery" class="btn btn--primary" data-i18n="mo.browse">Browse cakes</a>
        </div>
    </div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/maintenance-guard.js"></script>
<script src="js/cart.js"></script>
<script src="js/myorders-page.js"></script>
</body>
</html>
