<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.N.E.S. - Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-page { padding: 100px 0 60px; min-height: 100vh; }
        .gallery-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .gallery-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }
    </style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 60 60" width="42" height="42">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#C8963E"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#C8963E"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#C8963E" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#C8963E"/>
                <ellipse cx="30" cy="16" rx="10" ry="2" fill="#E8C47A" opacity="0.5"/>
                <path d="M28 5c0-2 1-3 2-3s2 1 2 3" stroke="#C8963E" stroke-width="1.5" fill="none"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
            <a href="myorders" class="header__cart" aria-label="Track order" title="Track order">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
            </a>
            <a href="cart" class="header__cart" aria-label="Cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="header__cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<section class="gallery-page section--alt">
    <div class="container">
        <a href="/" class="gallery-page__back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n="galpage.back">Back to Home</span>
        </a>
        <h2 class="section__title" data-i18n="galpage.title">All Categories</h2>
        <p class="section__subtitle" data-i18n="galpage.subtitle">Browse all our cake categories</p>

        <div class="gallery__categories" id="allGalleryCategories"></div>

        <div class="gallery__expanded" id="galleryExpanded" style="display:none;">
            <button class="gallery__back" id="galleryBack">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                <span data-i18n="gallery.back">Back to categories</span>
            </button>
            <h3 class="gallery__cat-title" id="galleryCatTitle"></h3>
            <div class="catalog-grid" id="galleryCatGrid"></div>
        </div>
    </div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/maintenance-guard.js"></script>
<script src="js/cart.js"></script>
<script src="js/gallery-page.js"></script>
</body>
</html>
