    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-page { padding: 100px 0 60px; min-height: 100vh; }
        .gallery-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .gallery-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }

        /* Filter chips */
        .gallery-filters {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin: 28px 0 32px;
        }
        .gallery-chip {
            border: 1px solid #E0CFA8; background: var(--white); color: var(--brown);
            padding: 9px 18px; border-radius: 999px; font-size: 0.92rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); font-family: inherit;
            white-space: nowrap;
        }
        .gallery-chip:hover { border-color: var(--gold); color: var(--gold-dark); }
        .gallery-chip--active { background: var(--gold); border-color: var(--gold); color: #fff; }
        .gallery-chip__count { opacity: 0.7; font-weight: 500; margin-left: 4px; }
        @media (max-width: 600px) {
            /* Swipeable filter strip instead of many wrapped rows */
            .gallery-filters {
                flex-wrap: nowrap; justify-content: flex-start;
                overflow-x: auto; -webkit-overflow-scrolling: touch;
                margin-left: -16px; margin-right: -16px; padding: 0 16px 6px;
                scrollbar-width: none;
            }
            .gallery-filters::-webkit-scrollbar { display: none; }
            .gallery-chip { flex: 0 0 auto; padding: 8px 14px; font-size: 0.85rem; }
        }

        /* Zoom button on cards */
        .catalog-card__img { position: relative; }
        .catalog-card__zoom {
            position: absolute; top: 10px; right: 10px; z-index: 2;
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.92); color: var(--brown);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            opacity: 0; transition: var(--transition);
        }
        .catalog-card:hover .catalog-card__zoom { opacity: 1; }
        .catalog-card__zoom:hover { background: #fff; color: var(--gold-dark); }
        @media (hover: none) { .catalog-card__zoom { opacity: 1; } }
    </style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 60 60" width="42" height="42">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#C8963E"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#C8963E"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#C8963E" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#C8963E"/>
                <ellipse cx="30" cy="16" rx="10" ry="2" fill="#E8C47A" opacity="0.5"/>
                <path d="M28 5c0-2 1-3 2-3s2 1 2 3" stroke="#C8963E" stroke-width="1.5" fill="none"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
                <div class="lang-switcher">
                    <button type="button" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-trigger__label">EN</span>
                        <svg class="lang-trigger__chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="listbox">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="ga">Gaeilge</button>
                        <button class="lang-btn" data-lang="ua">Українська</button>
                        <button class="lang-btn" data-lang="ru">Русский</button>
                    </div>
                </div>
            <a href="myorders" class="header__cart" aria-label="Track order" title="Track order">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
            </a>
            <a href="cart" class="header__cart" aria-label="Cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="header__cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<section class="gallery-page section--alt">
    <div class="container">
        <a href="/" class="gallery-page__back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n="galpage.back">Back to Home</span>
        </a>
        <h2 class="section__title" data-i18n="gal.title">Our Cakes</h2>
        <p class="section__subtitle" data-i18n="gal.subtitle">Browse our cakes - filter by category</p>

        <div class="gallery-filters" id="galleryFilters"></div>
        <div class="catalog-grid" id="galleryGrid"></div>
        <div class="catalog-empty" id="galleryEmpty" style="display:none;">
            <p data-i18n="gal.empty">Our cakes are coming soon - check back shortly!</p>
        </div>
    </div>
</section>

</html>
