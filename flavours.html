    <style>
        .flavours-page { padding: 100px 0 60px; min-height: 100vh; }
        .flavours-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .flavours-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }
        .flavours-page__grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 24px; margin: 32px auto 0; max-width: 1000px;
        }
        .flavour-card--selectable { cursor: pointer; }
        @media (max-width: 900px) { .flavours-page__grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .flavours-page__grid { grid-template-columns: 1fr; } }
    </style>

    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 64 64" width="42" height="42" fill="none" stroke="#3D2E1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M32 11c-1.1-2-3.8-1.1-3.8 0.9 0 1.7 2.4 3 3.8 4 1.4-1 3.8-2.3 3.8-4 0-2-2.7-2.9-3.8-0.9z"/><path d="M32 16.2c-0.6-1.6-0.3-3 0-4"/><path d="M32 16.2 A4 1.8 0 1 1 30.5 19.6 A7 2.2 0 1 1 30.5 24.6 A10 2.6 0 1 1 31 29.8"/><path d="M17.5 33 L46.5 33 L43.7 52.5 C43.5 53.8 42.4 54.8 41 54.8 L23 54.8 C21.6 54.8 20.5 53.8 20.3 52.5 Z"/></svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
                <div class="lang-switcher">
                    <button type="button" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-trigger__label">EN</span>
                        <svg class="lang-trigger__chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="listbox">

                        <button class="lang-btn" data-lang="ua">Українська</button>

                    </div>
                </div>
        </div>
    </div>
</header>
