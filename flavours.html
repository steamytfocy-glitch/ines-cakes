<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://ines-cakes-default-rtdb.europe-west1.firebasedatabase.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Flavours — I.N.E.S. Custom Cakes, Donegal</title>
    <meta name="description" content="Discover our cake flavours, from classic vanilla and chocolate to rich custom combinations — all made from natural ingredients in County Donegal, Ireland.">
    <link rel="canonical" href="https://www.inescake.com/flavours">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="I.N.E.S. Cakes">
    <meta property="og:title" content="Cake Flavours — I.N.E.S. Custom Cakes, Donegal">
    <meta property="og:description" content="Discover our cake flavours, from classic vanilla and chocolate to rich custom combinations — all made from natural ingredients in County Donegal, Ireland.">
    <meta property="og:url" content="https://www.inescake.com/flavours">
    <meta property="og:image" content="https://www.inescake.com/images/og-logo.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.inescake.com/images/og-logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .flavours-page { padding: 100px 0 60px; min-height: 100vh; }
        .flavours-page__back {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gold); font-weight: 600; font-size: 0.95rem;
            margin-bottom: 24px; cursor: pointer; text-decoration: none;
            transition: 0.3s ease;
        }
        .flavours-page__back:hover { color: var(--gold-dark); transform: translateX(-4px); }
        .flavours-page__grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 24px; margin-top: 32px;
        }
        @media (max-width: 900px) { .flavours-page__grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .flavours-page__grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 60 60" width="42" height="42">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#C8963E"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#C8963E"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#C8963E" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#C8963E"/>
                <ellipse cx="30" cy="16" rx="10" ry="2" fill="#E8C47A" opacity="0.5"/>
                <path d="M28 5c0-2 1-3 2-3s2 1 2 3" stroke="#C8963E" stroke-width="1.5" fill="none"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
                <div class="lang-switcher">
                    <button type="button" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-trigger__label">EN</span>
                        <svg class="lang-trigger__chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="listbox">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="ga">Gaeilge</button>
                        <button class="lang-btn" data-lang="ua">Українська</button>
                        <button class="lang-btn" data-lang="ru">Русский</button>
                    </div>
                </div>
        </div>
    </div>
</header>

<section class="flavours-page section--alt">
    <div class="container">
        <a href="/" class="flavours-page__back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n="flpage.back">Back to Home</span>
        </a>
        <h2 class="section__title" data-i18n="flpage.title">All Flavours</h2>
        <p class="section__subtitle" data-i18n="flpage.subtitle">A look inside every cake we make</p>
        <div class="flavours-page__grid" id="allFlavoursGrid"></div>
    </div>
</section>

<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script defer src="js/firebase-init.js"></script>
<script defer src="js/lang-switcher.js"></script>
<script defer src="js/maintenance-guard.js"></script>
<script defer src="js/cart.js"></script>
<script defer src="js/flavours-page.js"></script>
</body>
</html>
