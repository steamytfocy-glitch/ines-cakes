<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.N.E.S. — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 60 60" width="48" height="48">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#C8963E"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#C8963E"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#C8963E" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#C8963E"/>
            </svg>
            <h1>I.N.E.S.</h1>
            <p>Admin Panel</p>
        </div>
        <form id="loginForm">
            <div class="login-field">
                <label for="loginUser">Login</label>
                <input type="text" id="loginUser" required autocomplete="username">
            </div>
            <div class="login-field">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" required autocomplete="current-password">
            </div>
            <p class="login-error" id="loginError"></p>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</div>

<!-- Admin Panel -->
<div class="admin" id="adminPanel" style="display:none;">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar__logo">
            <svg viewBox="0 0 60 60" width="32" height="32">
                <path d="M30 8c-3 0-5.5 2-6 5h12c-.5-3-3-5-6-5z" fill="#E8C47A"/>
                <rect x="20" y="13" width="20" height="3" rx="1.5" fill="#E8C47A"/>
                <path d="M18 16c0 0-2 4-2 10s2 12 4 14h20c2-2 4-8 4-14s-2-10-2-10H18z" fill="#E8C47A" opacity="0.85"/>
                <path d="M22 40h16v4c0 2-3 4-8 4s-8-2-8-4v-4z" fill="#E8C47A"/>
            </svg>
            <span>I.N.E.S.</span>
        </div>

        <nav class="sidebar__nav">
            <button class="sidebar__link active" data-tab="orders">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
                Orders
            </button>
            <button class="sidebar__link" data-tab="gallery">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                Gallery
            </button>
            <button class="sidebar__link" data-tab="flavours">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 00-7 7c0 2 1 3 1 5h12c0-2 1-3 1-5a7 7 0 00-7-7z"/><line x1="6" y1="18" x2="18" y2="18"/><line x1="7" y1="22" x2="17" y2="22"/></svg>
                Flavours
            </button>
            <button class="sidebar__link" data-tab="reviews">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
                Reviews
            </button>
            <button class="sidebar__link" data-tab="content">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Content
            </button>
        </nav>

        <div class="sidebar__bottom">
            <div class="sidebar__user" id="sidebarUser">admin</div>
            <button class="sidebar__logout" id="logoutBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Log out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Header -->
        <header class="topbar">
            <button class="topbar__burger" id="adminBurger">
                <span></span><span></span><span></span>
            </button>
            <h2 class="topbar__title" id="topbarTitle">Orders</h2>
            <a href="index.html" class="topbar__site" target="_blank">View Site &rarr;</a>
        </header>

        <!-- ORDERS TAB -->
        <div class="tab-content active" id="tab-orders">
            <div class="tab-header">
                <div class="tab-stats" id="orderStats"></div>
            </div>
            <div class="orders-list" id="ordersList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#C8963E" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
                    <p>No orders yet</p>
                    <span>Orders from the website form will appear here</span>
                </div>
            </div>
        </div>

        <!-- GALLERY TAB -->
        <div class="tab-content" id="tab-gallery">
            <div class="tab-header">
                <div class="tab-header__left" style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn-admin" id="addPhotoBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add Photo
                    </button>
                    <button class="btn-admin" id="sortPhotosBtn" style="background:#5A4530;">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Sort by Category
                    </button>
                </div>
            </div>

            <!-- Sort mode panel -->
            <div id="sortPanel" style="display:none;">
                <div class="sort-header">
                    <p class="sort-hint">Click on a photo, then choose a category</p>
                    <button class="btn-cancel" id="sortDone">Done Sorting</button>
                </div>
                <div class="sort-grid" id="sortGrid"></div>
            </div>

            <!-- Category picker modal for upload -->
            <div class="modal" id="categoryModal" style="display:none;">
                <div class="modal__overlay"></div>
                <div class="modal__card">
                    <h3>Choose Category</h3>
                    <div class="category-pick" id="categoryPick"></div>
                    <div class="modal__buttons">
                        <button type="button" class="btn-cancel" id="categoryCancel">Cancel</button>
                    </div>
                </div>
            </div>

            <input type="file" id="galleryUpload" accept="image/*" multiple style="display:none;">
            <div class="gallery-admin-categories" id="galleryAdmin"></div>
        </div>

        <!-- FLAVOURS TAB -->
        <div class="tab-content" id="tab-flavours">
            <div class="tab-header">
                <button class="btn-admin" id="addFlavourBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Flavour
                </button>
            </div>
            <div class="flavours-admin" id="flavoursAdmin"></div>

            <!-- Add/Edit Flavour Modal -->
            <div class="modal" id="flavourModal" style="display:none;">
                <div class="modal__overlay"></div>
                <div class="modal__card">
                    <h3 id="flavourModalTitle">Add Flavour</h3>
                    <form id="flavourForm">
                        <input type="hidden" id="flavourEditId">
                        <div class="modal__field">
                            <label>Flavour Name</label>
                            <input type="text" id="flavourName" required placeholder="e.g. Chocolate">
                        </div>
                        <div class="modal__field">
                            <label>Description</label>
                            <textarea id="flavourDesc" rows="2" placeholder="Short description of the flavour"></textarea>
                        </div>
                        <div class="modal__field">
                            <label>Price per kg (€) — optional</label>
                            <input type="text" id="flavourPrice" placeholder="e.g. 30">
                        </div>
                        <div class="modal__field">
                            <label>Cross-section Photo</label>
                            <input type="file" id="flavourPhoto" accept="image/*">
                            <div id="flavourPhotoPreview" style="margin-top:8px;"></div>
                        </div>
                        <div class="modal__buttons">
                            <button type="button" class="btn-cancel" id="flavourCancel">Cancel</button>
                            <button type="submit" class="btn-admin">Save Flavour</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- REVIEWS TAB -->
        <div class="tab-content" id="tab-reviews">
            <div class="tab-header">
                <button class="btn-admin" id="addReviewBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Review
                </button>
            </div>
            <div class="reviews-admin" id="reviewsAdmin"></div>

            <!-- Add/Edit Review Modal -->
            <div class="modal" id="reviewModal" style="display:none;">
                <div class="modal__overlay"></div>
                <div class="modal__card">
                    <h3 id="reviewModalTitle">Add Review</h3>
                    <form id="reviewForm">
                        <input type="hidden" id="reviewEditId">
                        <div class="modal__field">
                            <label>Customer Name</label>
                            <input type="text" id="reviewAuthor" required>
                        </div>
                        <div class="modal__field">
                            <label>Rating</label>
                            <select id="reviewRating">
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                            </select>
                        </div>
                        <div class="modal__field">
                            <label>Review Text</label>
                            <textarea id="reviewText" rows="3" required></textarea>
                        </div>
                        <div class="modal__buttons">
                            <button type="button" class="btn-cancel" id="reviewCancel">Cancel</button>
                            <button type="submit" class="btn-admin">Save Review</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- CONTENT TAB -->
        <div class="tab-content" id="tab-content">
            <div class="content-admin">
                <div class="content-section">
                    <h3>Cake Prices</h3>
                    <div class="content-grid">
                        <div class="content-field">
                            <label>Mini 5" (13 cm) price</label>
                            <input type="text" id="priceMini" value="30" data-key="priceMini">
                            <span class="content-hint">Number only, e.g. 30</span>
                        </div>
                        <div class="content-field">
                            <label>Maxi 6" (15 cm) price</label>
                            <input type="text" id="priceMaxi" value="35" data-key="priceMaxi">
                            <span class="content-hint">Number only, e.g. 35</span>
                        </div>
                    </div>
                </div>

                <div class="content-section">
                    <h3>Cake Shed Schedule</h3>
                    <div class="content-grid">
                        <div class="content-field">
                            <label>Open days</label>
                            <input type="text" id="shedDays" value="Friday, Saturday, Sunday" data-key="shedDays">
                        </div>
                        <div class="content-field">
                            <label>Opening hours</label>
                            <input type="text" id="shedHours" value="" data-key="shedHours" placeholder="e.g. 10:00 — 17:00">
                        </div>
                    </div>
                </div>

                <div class="content-section">
                    <h3>Contact Info</h3>
                    <div class="content-grid">
                        <div class="content-field">
                            <label>Phone</label>
                            <input type="text" id="contactPhone" value="087 491 7435" data-key="contactPhone">
                        </div>
                        <div class="content-field">
                            <label>Address</label>
                            <input type="text" id="contactAddress" value="Mullaghdaff Scotch, Kincasslagh, Co. Donegal, F94 C2D7" data-key="contactAddress">
                        </div>
                        <div class="content-field">
                            <label>Instagram link</label>
                            <input type="text" id="contactInsta" value="" data-key="contactInsta" placeholder="https://instagram.com/...">
                        </div>
                        <div class="content-field">
                            <label>Facebook link</label>
                            <input type="text" id="contactFacebook" value="" data-key="contactFacebook" placeholder="https://facebook.com/...">
                        </div>
                    </div>
                </div>

                <button class="btn-admin" id="saveContentBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Changes
                </button>
                <p class="save-status" id="saveStatus"></p>
            </div>
        </div>

    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
