<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://ines-cakes-default-rtdb.europe-west1.firebasedatabase.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>I.N.E.S. - Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header" id="header">
    <div class="container header__inner">
        <a href="/" class="logo">
            <svg class="logo__icon" viewBox="0 0 64 64" width="40" height="40" fill="none" stroke="#3D2E1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 11c-1.1-2-3.8-1.1-3.8 0.9 0 1.7 2.4 3 3.8 4 1.4-1 3.8-2.3 3.8-4 0-2-2.7-2.9-3.8-0.9z"/>
                <path d="M32 16.2c-0.6-1.6-0.3-3 0-4"/>
                <path d="M32 16.2 A4 1.8 0 1 1 30.5 19.6 A7 2.2 0 1 1 30.5 24.6 A10 2.6 0 1 1 31 29.8"/>
                <path d="M17.5 33 L46.5 33 L43.7 52.5 C43.5 53.8 42.4 54.8 41 54.8 L23 54.8 C21.6 54.8 20.5 53.8 20.3 52.5 Z"/>
            </svg>
            <div class="logo__text">
                <span class="logo__name">I.N.E.S.</span>
                <span class="logo__tagline">IMPECCABLE NATURALS<br>EXQUISITE SWEETS</span>
            </div>
        </a>
        <div class="header__right">
                <div class="lang-switcher">
                    <button type="button" class="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-trigger__label">EN</span>
                        <svg class="lang-trigger__chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="lang-menu" role="listbox">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="ga">Gaeilge</button>
                        <button class="lang-btn" data-lang="ua">Українська</button>
                        <button class="lang-btn" data-lang="ru">Русский</button>
                    </div>
                </div>
            <a href="myorders" class="header__cart" aria-label="Track order" title="Track order">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
            </a>
            <a href="cart" class="header__cart" aria-label="Cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <span class="header__cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<section class="cart section">
    <div class="container container--narrow">
        <a href="/#cakes" class="back-link" data-i18n="cart.back">&larr; Continue shopping</a>
        <h1 class="cart__title" data-i18n="cart.title">Your cart</h1>

        <div class="cart__empty" id="cartEmpty" style="display:none;">
            <p data-i18n="cart.empty">Your cart is empty.</p>
            <a href="/#cakes" class="btn btn--primary" data-i18n="cart.browse">Browse cakes</a>
        </div>

        <div id="cartContent" style="display:none;">
            <div class="cart__items" id="cartItems"></div>

            <div class="cart__total-row">
                <span data-i18n="cart.total">Total</span>
                <span class="cart__total" id="cartTotalVal">€0</span>
            </div>

            <form class="cart__checkout" id="checkoutForm">
                <h3 data-i18n="cart.your">Your details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="order.name">Your Name</label>
                        <input type="text" id="coName" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="order.phone">Phone Number</label>
                        <input type="tel" id="coPhone" required>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="order.email">Email</label>
                    <input type="email" id="coEmail">
                </div>
                <button type="submit" class="btn btn--primary btn--full" id="placeOrderBtn" data-i18n="cart.place">Place order</button>
                <p class="cart__note" data-i18n="cart.note">No online payment - we'll contact you to confirm and arrange payment.</p>
            </form>
        </div>
    </div>
</section>

<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script defer src="js/firebase-init.js"></script>
<script defer src="js/lang-switcher.js"></script>
<script defer src="js/maintenance-guard.js"></script>
<script defer src="js/cart.js"></script>
<script defer src="js/cart-page.js"></script>
</body>
</html>
